name: build-omi
on:
  push:
    branches: [main]
    paths-ignore: ['data/**']
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install py7zr
      - run: python build.py
      - run: |
          git config user.name "omi-bot"
          git config user.email "omi-bot@users.noreply.github.com"
          git add data
          git commit -m "update OMI data [skip ci]" || echo "no changes"
          git push
